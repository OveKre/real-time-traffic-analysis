name: Benchmarks

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run benchmark runner
        run: ./mvnw -q -DskipTests compile exec:java -Dexec.mainClass=com.example.traffic.benchmark.TrafficBenchmarkRunner

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: traffic-benchmark-report
          path: target/benchmarks
