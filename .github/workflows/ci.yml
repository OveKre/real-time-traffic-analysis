name: CI

on:
  push:
    branches:
      - main
      - "[0-9]+-*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        run: ./mvnw verify

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            target/site/jacoco
            target/surefire-reports
            target/failsafe-reports

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Restore dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: dependency-check-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP dependency scan
        run: ./scripts/run-dependency-scan.sh

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
